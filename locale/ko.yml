    # 서버 점검 중
    지금은 **서버 점검 및 패치 작업**으로 인하여 **봇을 사용할 수 없습니다.**
    이용에 불편을 드려 죄송합니다.
    ## 종료까지 남은 예상 시간: **{remain}**
    점검은 조기 종료 될 수 있으며, 또한 지연될 수 있음을 알립니다.

general:
  error-cmd: |
    ❌ 처리 중 오류가 발생했습니다. 
    오류라고 판단된다면 개발자에게 문의해주세요.
  unable: |
    ## 아직 사용할 수 없는 기능입니다...
    현재 개발 진행중인 명령어 입니다.
  # 오류라고 판단되는 경우, 봇 개발 담당자에게 문의 부탁드립니다.
  admin: |
    ## 사용 권한 없음
    - **서버 관리자만 사용할 수 있습니다.**
    - 간부진인데 사용이 불가하다면, 봇 개발자에게 문의 바랍니다.
  banned: |
    # 기능 사용이 차단되었습니다.
    - 이용약관 위반행위로 인한 경고 누적으로 봇을 사용할 수 없습니다.
    ## 차단된 시간: `{time}`
    > 자세한 사항은 간부진에게 문의 바랍니다.
  developer: |
    ## 사용 권한 없음
    - 개발자만 사용할 수 있는 기능입니다.

