cmd:
  no-perm-title: "❌ 권한 없음"
  no-permission: |
    공개 메시지를 보낼 권한이 없습니다.
    선택된 관리자만 전체 공개 메시지를 보낼 수 있습니다.

    오류라고 판단된다면 봇 개발자에게 문의해주세요.
  err-limit-server: |
    ## 등록되지 않은 서버
    ❌ 등록된 서버에서만 사용할 수 있는 명령어 입니다.
    이미 등록을 완료하였다면, 채널 설정을 다시 확인해주세요.

    > 오류라고 판단되거나, 등록을 원하신다면 담당자에게 문의해주세요.
  ch-not-found: |
    ### ❌ 오류
    - 게시글이 생성될 채널을 찾을 수 없어요.
    - `/등록` 명령어로 채널을 등록해주세요.
    
    지속적으로 문제가 발생할 경우 지원 서버에 문의해주세요.
  err-perm-webhook: "❌ 봇에게 '웹후크 관리' 권한이 필요합니다."
  err-cooldown:
    title: "❌ 재사용 대기시간"
    desc: 이 명령어를 다시 사용하려면 {time}초 더 기다려야 합니다.
    btn: 버튼을 다시 사용하려면 {time}초 더 기다려야 합니다.
  err-db: "❌ 데이터베이스에 오류가 발생했습니다. 개발자에게 문의해주세요."
  err-timeout: 시간이 초과되어 작업이 취소되었어요.
